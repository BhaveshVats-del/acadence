<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadence | Adaptive AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .input-premium {
            background: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: border-color 0.4s;
        }
        .input-premium:focus {
            outline: none;
            border-color: #a78bfa;
        }
        .chat-bubble {
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden-step { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="w-full max-w-4xl h-[85vh] glass-panel rounded-[3rem] relative flex flex-col overflow-hidden shadow-2xl">
        
        <!-- Header -->
        <div class="p-10 flex justify-between items-center border-b border-white/5">
            <h1 class="text-2xl font-serif italic tracking-tighter">Acadence</h1>
            <div id="status-tag" class="px-4 py-1 rounded-full border border-purple-500/30 text-[10px] uppercase tracking-[0.2em] text-purple-400 font-bold">
                AI Onboarding
            </div>
        </div>

        <!-- Conversational Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-12 space-y-12">
            
            <!-- Step 1: Intent -->
            <div id="step-1" class="chat-bubble">
                <p class="text-gray-500 text-sm font-serif italic mb-2 font-light">Welcome to the Elite Tier.</p>
                <h2 class="text-3xl font-light mb-8">What brings you to Acadence today?</h2>
                <div class="flex gap-4">
                    <button onclick="handleIntent('exam')" class="px-8 py-4 rounded-2xl glass-panel hover:bg-white/10 transition-all text-sm tracking-wide">Final Exams</button>
                    <button onclick="handleIntent('regular')" class="px-8 py-4 rounded-2xl glass-panel hover:bg-white/10 transition-all text-sm tracking-wide text-gray-400">Regular Studies</button>
                </div>
            </div>

            <!-- Step 2: Subject Input (Regular) -->
            <div id="step-regular" class="chat-bubble hidden-step">
                <h2 class="text-3xl font-light mb-6">Which subjects define your curriculum?</h2>
                <input type="text" id="subject-input" placeholder="e.g. Physics, Calculus, History..." class="input-premium w-full py-4 text-xl font-light">
                <button onclick="generateTimetable('regular')" class="mt-8 text-purple-400 text-xs uppercase tracking-widest font-bold">Generate Routine →</button>
            </div>

            <!-- Step 3: Exam Days (Exam) -->
            <div id="step-exam-days" class="chat-bubble hidden-step">
                <h2 class="text-3xl font-light mb-6">How many days until the first paper?</h2>
                <input type="number" id="exam-countdown-input" placeholder="Enter number of days" class="input-premium w-full py-4 text-xl font-light">
                <button onclick="nextStep('step-exam-datesheet')" class="mt-8 text-purple-400 text-xs uppercase tracking-widest font-bold">Configure Datesheet →</button>
            </div>

            <!-- Step 4: Datesheet/Topics (Exam) -->
            <div id="step-exam-datesheet" class="chat-bubble hidden-step">
                <h2 class="text-3xl font-light mb-6">List your papers and sub-topics.</h2>
                <p class="text-gray-500 text-sm mb-6">Our AI will shard these into a daily study flow.</p>
                <textarea id="topics-input" placeholder="Math (Algebra, Trig), Science (Physics, Bio)..." class="input-premium w-full py-4 text-lg font-light h-32"></textarea>
                <button onclick="generateTimetable('exam')" class="mt-8 bg-white text-black px-10 py-4 rounded-full text-xs uppercase tracking-widest font-bold">Prepare Master Schedule</button>
            </div>

            <!-- Step 5: The Result (Final Timetable) -->
            <div id="final-result" class="chat-bubble hidden-step pb-20">
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                    <span class="text-[10px] uppercase tracking-[0.4em] text-gray-600">Calculated Strategy</span>
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                </div>
                <div id="timetable-output" class="space-y-4">
                    <!-- Dynamic Timetable will inject here -->
                </div>
            </div>

        </div>

        <!-- Decorative Blur -->
        <div class="absolute bottom-0 right-0 w-64 h-64 bg-purple-600/5 blur-[100px] pointer-events-none"></div>
    </div>

    <script>
        lucide.createIcons();

        function handleIntent(intent) {
            document.getElementById('step-1').style.opacity = '0.3';
            if(intent === 'exam') {
                showStep('step-exam-days');
            } else {
                showStep('step-regular');
            }
        }

        function showStep(stepId) {
            const step = document.getElementById(stepId);
            step.classList.remove('hidden-step');
            step.scrollIntoView({ behavior: 'smooth' });
        }

        function nextStep(stepId) {
            showStep(stepId);
        }

        function generateTimetable(type) {
            const output = document.getElementById('timetable-output');
            const container = document.getElementById('final-result');
            container.classList.remove('hidden-step');
            document.getElementById('status-tag').innerText = "Strategy Live";
            document.getElementById('status-tag').classList.replace('text-purple-400', 'text-green-400');

            let html = '';
            if(type === 'exam') {
                const days = document.getElementById('exam-countdown-input').value || 10;
                html = `
                    <div class="glass-panel p-8 rounded-[2rem] border-green-500/20">
                        <p class="text-green-400 text-[10px] font-bold uppercase tracking-widest mb-4">CRITICAL PATH ACTIVATED</p>
                        <div class="space-y-6">
                            <div class="flex justify-between items-center">
                                <span>Phase 1: Deep Revision</span>
                                <span class="text-xs text-gray-500">Days 1-${Math.floor(days/2)}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span>Phase 2: Mock Testing</span>
                                <span class="text-xs text-gray-500">Days ${Math.floor(days/2) + 1}-${days-1}</span>
                            </div>
                            <div class="flex justify-between items-center text-purple-400">
                                <span>Final Refinement</span>
                                <span class="text-xs">24 Hours Pre-Exam</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass-panel p-6 rounded-2xl">
                            <p class="text-[10px] text-gray-500 uppercase mb-2">Morning Session</p>
                            <p class="text-lg font-light">Deep Work Focus</p>
                        </div>
                        <div class="glass-panel p-6 rounded-2xl">
                            <p class="text-[10px] text-gray-500 uppercase mb-2">Evening Session</p>
                            <p class="text-lg font-light">Active Recall & Review</p>
                        </div>
                    </div>
                `;
            }

            output.innerHTML = html;
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

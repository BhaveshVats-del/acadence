<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadence | Your Student OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .gradient-text { background: linear-gradient(to right, #fff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body x-data="acadenceOS()" x-init="init()">

    <!-- 1. LANDING PAGE -->
    <template x-if="view === 'landing'">
        <div class="min-h-screen relative overflow-hidden flex flex-col items-center justify-center px-4">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-blue-600/10 blur-[120px] -z-10"></div>
            
            <nav class="absolute top-0 w-full flex justify-between items-center p-8 max-w-7xl">
                <div class="text-2xl font-bold tracking-tighter flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg"></div> ACADENCE
                </div>
                <button @click="view = 'onboarding'" class="glass px-6 py-2 rounded-full hover:bg-white/10 transition">Launch OS</button>
            </nav>

            <div class="text-center max-w-4xl">
                <span class="px-4 py-1 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-400 text-sm mb-6 inline-block">The All-in-One Student Workspace</span>
                <h1 class="text-6xl md:text-8xl font-bold tracking-tight mb-8 gradient-text">Master School, Studies, and Life.</h1>
                <p class="text-gray-400 text-xl mb-10 max-w-2xl mx-auto">The ultimate productivity platform built exclusively for students. Experience world-class academic management.</p>
                
                <div class="flex flex-col md:flex-row gap-4 justify-center">
                    <button @click="view = 'onboarding'" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl text-lg font-semibold transition accent-glow">
                        Get Started Free
                    </button>
                    <button class="glass px-10 py-4 rounded-2xl text-lg font-semibold hover:bg-white/5 transition">
                        View Demo
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- 2. ONBOARDING FLOW -->
    <template x-if="view === 'onboarding'">
        <div class="min-h-screen flex items-center justify-center p-6 bg-[#080808]">
            <div class="glass max-w-xl w-full p-10 rounded-[2rem] space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold">Setup Your Identity</h2>
                    <span class="text-blue-500 font-mono">Step 1/3</span>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-sm text-gray-400">Full Name</label>
                        <input x-model="user.name" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mt-1 focus:border-blue-500 outline-none transition" placeholder="Alex Sterling">
                    </div>
                    <div>
                        <label class="text-sm text-gray-400">Current Grade / Class</label>
                        <input x-model="user.grade" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mt-1 focus:border-blue-500 outline-none transition" placeholder="Sophomore Year">
                    </div>
                </div>

                <button @click="completeOnboarding()" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-gray-200 transition">
                    Enter Acadence
                </button>
            </div>
        </div>
    </template>

    <!-- 3. MAIN DASHBOARD (The Operating System) -->
    <template x-if="view === 'dashboard'">
        <div class="flex h-screen overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-64 glass border-r border-white/5 flex flex-col p-6">
                <div class="text-xl font-bold mb-10 flex items-center gap-2">
                    <div class="w-6 h-6 bg-blue-600 rounded"></div> ACADENCE
                </div>
                
                <nav class="flex-1 space-y-2">
                    <button class="w-full text-left p-3 rounded-xl bg-white/5 flex items-center gap-3"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
                    <button class="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 text-gray-400"><i data-lucide="book-open" class="w-5 h-5"></i> Subjects</button>
                    <button class="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 text-gray-400"><i data-lucide="calendar" class="w-5 h-5"></i> Timetable</button>
                    <button class="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center gap-3 text-gray-400"><i data-lucide="award" class="w-5 h-5"></i> Gamification</button>
                </nav>

                <div class="mt-auto glass p-4 rounded-2xl bg-blue-600/10 border-blue-500/20">
                    <div class="flex items-center justify-between text-xs mb-2">
                        <span class="text-blue-400 font-bold">LEVEL <span x-text="user.level"></span></span>
                        <span x-text="user.xp + '/1000 XP'"></span>
                    </div>
                    <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-full transition-all duration-500" :style="`width: ${(user.xp / 1000) * 100}%`"></div>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto p-10 bg-[#020202]">
                <header class="flex justify-between items-end mb-12">
                    <div>
                        <h2 class="text-4xl font-bold mb-2">Welcome, <span x-text="user.name"></span></h2>
                        <p class="text-gray-500">Here's your academic summary for today.</p>
                    </div>
                    <div class="flex gap-4">
                        <div class="glass px-4 py-2 rounded-xl flex items-center gap-2">
                            <span class="text-orange-500">🔥</span> <span class="font-bold">7 Day Streak</span>
                        </div>
                    </div>
                </header>

                <!-- Grid Widgets -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Quick Actions -->
                    <div class="glass p-6 rounded-[2rem] col-span-2">
                        <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="zap" class="w-5 h-5 text-yellow-400"></i> Smart Tasks
                        </h3>
                        <div class="space-y-3">
                            <template x-for="task in tasks" :key="task.id">
                                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5 hover:border-white/10 transition cursor-pointer group" @click="completeTask(task.id)">
                                    <div class="flex items-center gap-4">
                                        <div class="w-6 h-6 rounded-full border-2 border-white/20 group-hover:border-blue-500 transition"></div>
                                        <span x-text="task.title"></span>
                                    </div>
                                    <span class="text-xs px-3 py-1 rounded-full bg-blue-500/10 text-blue-400" x-text="task.tag"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Wellness Tracker -->
                    <div class="glass p-6 rounded-[2rem]">
                        <h3 class="text-lg font-semibold mb-6">Wellness Center</h3>
                        <div class="space-y-6">
                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span>Hydration</span>
                                    <span x-text="wellness.water + ' / 8 Glasses'"></span>
                                </div>
                                <div class="grid grid-cols-8 gap-2">
                                    <template x-for="i in 8">
                                        <button @click="wellness.water = i" :class="wellness.water >= i ? 'bg-blue-500' : 'bg-white/10'" class="h-2 rounded-full transition"></button>
                                    </template>
                                </div>
                            </div>
                            <div class="p-4 bg-white/5 rounded-2xl">
                                <p class="text-xs text-gray-500 mb-1">Current Focus</p>
                                <p class="font-bold">Pomodoro Session</p>
                                <button class="mt-3 w-full py-2 bg-blue-600 rounded-lg text-sm font-bold">Start Timer</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AI Insight Banner -->
                <div class="mt-10 p-6 rounded-[2rem] bg-gradient-to-r from-blue-600/20 to-purple-600/20 border border-blue-500/20 flex items-center gap-6">
                    <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center text-2xl">🧠</div>
                    <div>
                        <h4 class="font-bold">Offline AI Insight</h4>
                        <p class="text-gray-400 text-sm">Based on your upcoming Physics test, I recommend a 45-minute active recall session tonight.</p>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <script>
        function acadenceOS() {
            return {
                view: 'landing', // 'landing', 'onboarding', 'dashboard'
                user: {
                    name: '',
                    grade: '',
                    xp: 250,
                    level: 1
                },
                wellness: {
                    water: 3,
                    mood: 'Great'
                },
                tasks: [
                    { id: 1, title: 'Math Homework: Calculus Ch. 4', tag: 'Academic' },
                    { id: 2, title: 'Submit Debate Research', tag: 'Extracurricular' },
                    { id: 3, title: 'English Essay Draft', tag: 'Academic' }
                ],
                init() {
                    const savedData = localStorage.getItem('acadence_data');
                    if (savedData) {
                        const parsed = JSON.parse(savedData);
                        this.user = parsed.user;
                        this.view = 'dashboard';
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                    lucide.createIcons();
                },
                completeOnboarding() {
                    if (this.user.name.trim() === '') return alert('Please enter your name');
                    this.view = 'dashboard';
                    this.save();
                    setTimeout(() => lucide.createIcons(), 100);
                },
                completeTask(id) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.user.xp += 100;
                    if (this.user.xp >= 1000) {
                        this.user.level++;
                        this.user.xp = 0;
                    }
                    this.save();
                },
                save() {
                    localStorage.setItem('acadence_data', JSON.stringify({
                        user: this.user,
                        wellness: this.wellness
                    }));
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadence | The Student OS</title>
    
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,500&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }
        :root { --accent: #a78bfa; }
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .premium-border { border-color: rgba(167, 139, 250, 0.2); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        .glow-text { text-shadow: 0 0 20px rgba(167, 139, 250, 0.5); }
        .nav-item.active { color: var(--accent); background: rgba(167, 139, 250, 0.1); }
    </style>
</head>
<body x-data="acadenceOS()">

    <!-- 1. ATTENDANCE GATEKEEPER -->
    <template x-if="!authorized">
        <div class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-all duration-1000">
            <div class="text-center">
                <h1 class="text-5xl font-serif italic mb-2">Acadence</h1>
                <p class="text-[10px] uppercase tracking-[0.5em] text-gray-500 mb-16">Syncing Student Identity...</p>
                
                <button @click="markAttendance()" class="group relative p-14 rounded-full glass hover:premium-border transition-all active:scale-95">
                    <div class="absolute inset-0 bg-purple-500/10 blur-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <i data-lucide="fingerprint" class="w-12 h-12 text-purple-400"></i>
                </button>
                <p class="mt-8 text-gray-600 text-[10px] uppercase tracking-widest animate-pulse">Tap to authenticate & start streak</p>
            </div>
        </div>
    </template>

    <!-- 2. MAIN OPERATING SYSTEM -->
    <div x-show="authorized" x-cloak class="flex h-screen opacity-0 transition-opacity duration-1000" :class="authorized ? 'opacity-100' : ''">
        
        <!-- SIDEBAR NAVIGATION -->
        <aside class="w-20 border-r border-white/5 flex flex-col items-center py-8 gap-8 bg-black/50">
            <div class="mb-4 font-serif italic text-2xl cursor-default">A</div>
            <nav class="flex flex-col gap-4">
                <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'nav-item active' : 'nav-item'" class="p-3 rounded-2xl text-gray-500 hover:text-white transition-all"><i data-lucide="zap" class="w-5 h-5"></i></button>
                <button @click="view = 'academic'" :class="view === 'academic' ? 'nav-item active' : 'nav-item'" class="p-3 rounded-2xl text-gray-500 hover:text-white transition-all"><i data-lucide="book-open" class="w-5 h-5"></i></button>
                <button @click="view = 'extra'" :class="view === 'extra' ? 'nav-item active' : 'nav-item'" class="p-3 rounded-2xl text-gray-500 hover:text-white transition-all"><i data-lucide="trophy" class="w-5 h-5"></i></button>
                <button @click="view = 'analytics'" :class="view === 'analytics' ? 'nav-item active' : 'nav-item'" class="p-3 rounded-2xl text-gray-500 hover:text-white transition-all"><i data-lucide="bar-chart-3" class="w-5 h-5"></i></button>
                <button @click="view = 'wellness'" :class="view === 'wellness' ? 'nav-item active' : 'nav-item'" class="p-3 rounded-2xl text-gray-500 hover:text-white transition-all"><i data-lucide="heart" class="w-5 h-5"></i></button>
            </nav>
            <div class="mt-auto">
                <button @click="view = 'ai'" :class="view === 'ai' ? 'nav-item active' : 'nav-item'" class="p-3 rounded-2xl text-gray-500 hover:text-white transition-all"><i data-lucide="message-square" class="w-5 h-5"></i></button>
            </div>
        </aside>

        <!-- VIEWPORT -->
        <main class="flex-1 overflow-y-auto relative bg-[radial-gradient(circle_at_top_right,rgba(167,139,250,0.05),transparent)]">
            
            <!-- HEADER -->
            <header class="px-12 py-8 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-10">
                <div>
                    <h2 class="text-xs uppercase tracking-[0.4em] text-gray-500 font-bold mb-1" x-text="getGreeting()"></h2>
                    <h3 class="text-2xl font-serif italic" x-text="viewTitle()"></h3>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-orange-500/10 border border-orange-500/20">
                        <i data-lucide="zap" class="w-3 h-3 text-orange-500 fill-orange-500"></i>
                        <span class="text-[10px] font-bold text-orange-500 tracking-tighter" x-text="streak + ' DAY STREAK'"></span>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] uppercase tracking-widest text-purple-400 font-bold">Exam Countdown</p>
                        <p class="font-mono text-lg tracking-tighter shimmer-text" x-text="countdown"></p>
                    </div>
                </div>
            </header>

            <!-- CONTENT SECTIONS -->
            <div class="px-12 pb-20 max-w-7xl mx-auto space-y-12 mt-4">

                <!-- DASHBOARD VIEW -->
                <template x-if="view === 'dashboard'">
                    <div class="grid grid-cols-12 gap-8">
                        <!-- Primary Task Shard -->
                        <div class="col-span-8 glass p-10 rounded-[3rem] relative overflow-hidden group">
                            <div class="absolute top-0 right-0 w-80 h-80 bg-purple-600/5 blur-[100px] rounded-full group-hover:bg-purple-600/10 transition-all duration-1000"></div>
                            <p class="text-[10px] font-bold text-purple-400 uppercase tracking-[0.3em] mb-4">Current Focus Session</p>
                            <h4 class="text-4xl font-light mb-8">Physics: Quantum Mechanics <span class="text-lg font-serif italic text-gray-500">Revision Phase</span></h4>
                            
                            <div class="flex gap-12 border-t border-white/5 pt-8">
                                <div><p class="text-[9px] text-gray-600 uppercase mb-1">Time Allocated</p><p class="text-xl">120m</p></div>
                                <div><p class="text-[9px] text-gray-600 uppercase mb-1">Subtopics</p><p class="text-xl">04</p></div>
                                <div><p class="text-[9px] text-gray-600 uppercase mb-1">Intensity</p><p class="text-xl text-orange-400">High</p></div>
                            </div>
                        </div>

                        <!-- Waitlist / Subscription Card -->
                        <div class="col-span-4 glass p-8 rounded-[3rem] border-purple-500/20 bg-purple-500/[0.02] flex flex-col">
                            <h5 class="text-lg font-medium mb-2">Upgrade to Pro</h5>
                            <p class="text-xs text-gray-500 mb-6">Unlock College Portfolio Builder & Advanced AI Sharding.</p>
                            <input type="email" placeholder="Join waitlist..." class="bg-black/40 border border-white/5 rounded-xl px-4 py-3 text-xs mb-4 focus:border-purple-400 outline-none transition-all">
                            <button class="w-full py-4 bg-white text-black rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-purple-400 transition-all mt-auto">Join 2,400+ Students</button>
                        </div>

                        <!-- Mini Modules -->
                        <div class="col-span-12 grid grid-cols-4 gap-6">
                            <div class="glass p-6 rounded-3xl hover:bg-white/[0.04] transition-all cursor-pointer">
                                <i data-lucide="list-todo" class="w-5 h-5 text-blue-400 mb-4"></i>
                                <h6 class="text-sm font-medium">Homework</h6>
                                <p class="text-[10px] text-gray-500 mt-1">4 Pending Tasks</p>
                            </div>
                            <div class="glass p-6 rounded-3xl hover:bg-white/[0.04] transition-all cursor-pointer">
                                <i data-lucide="trophy" class="w-5 h-5 text-amber-400 mb-4"></i>
                                <h6 class="text-sm font-medium">Competition</h6>
                                <p class="text-[10px] text-gray-500 mt-1">Hackathon in 2d</p>
                            </div>
                            <div class="glass p-6 rounded-3xl hover:bg-white/[0.04] transition-all cursor-pointer">
                                <i data-lucide="droplets" class="w-5 h-5 text-cyan-400 mb-4"></i>
                                <h6 class="text-sm font-medium">Hydration</h6>
                                <p class="text-[10px] text-gray-500 mt-1">85% of Goal</p>
                            </div>
                            <div class="glass p-6 rounded-3xl hover:bg-white/[0.04] transition-all cursor-pointer">
                                <i data-lucide="moon" class="w-5 h-5 text-indigo-400 mb-4"></i>
                                <h6 class="text-sm font-medium">Sleep Path</h6>
                                <p class="text-[10px] text-gray-500 mt-1">Optimal: 7.5h</p>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ACADEMIC VIEW (Syllabus Sharder) -->
                <template x-if="view === 'academic'">
                    <div class="space-y-8 animate-in">
                        <div class="glass p-10 rounded-[3rem]">
                            <h4 class="text-2xl font-light mb-8">Syllabus Sharding <span class="text-xs text-purple-400 font-bold uppercase ml-2">AI Engine</span></h4>
                            <div class="grid grid-cols-2 gap-12">
                                <div class="space-y-6">
                                    <div>
                                        <label class="text-[9px] uppercase tracking-widest text-gray-500 mb-2 block">Set Exam Commencement</label>
                                        <input type="date" class="w-full bg-transparent border-b border-white/10 py-2 focus:border-purple-400 outline-none text-sm">
                                    </div>
                                    <div>
                                        <label class="text-[9px] uppercase tracking-widest text-gray-500 mb-2 block">Input Subject & Topics</label>
                                        <textarea placeholder="e.g. Math (Calculus, Trig), Science (Physics)..." class="w-full bg-transparent border border-white/10 rounded-2xl p-4 h-32 focus:border-purple-400 outline-none text-sm resize-none"></textarea>
                                    </div>
                                    <button class="bg-white text-black px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-purple-400 transition-all">Generate Combat Plan</button>
                                </div>
                                <div class="border border-dashed border-white/10 rounded-[2rem] flex flex-col items-center justify-center p-8 text-center">
                                    <i data-lucide="cpu" class="w-10 h-10 text-gray-700 mb-4"></i>
                                    <p class="text-xs text-gray-600 italic">Enter details to shard syllabus into daily 45-minute sessions.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ANALYTICS VIEW -->
                <template x-if="view === 'analytics'">
                    <div class="grid grid-cols-3 gap-8">
                        <div class="glass p-8 rounded-[2rem] col-span-2">
                            <h4 class="text-sm font-bold uppercase tracking-widest mb-8">Productivity Heatmap</h4>
                            <div class="h-48 flex items-end gap-2 px-4">
                                <template x-for="i in 14">
                                    <div class="flex-1 bg-purple-500/20 rounded-t-lg hover:bg-purple-400 transition-all" :style="'height:' + (Math.random() * 100) + '%'"></div>
                                </template>
                            </div>
                        </div>
                        <div class="glass p-8 rounded-[2rem] flex flex-col justify-center text-center">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2">Weekly Focus Score</p>
                            <h5 class="text-6xl font-light">94%</h5>
                            <p class="text-[10px] text-green-400 font-bold mt-4 uppercase">↑ 12% from last week</p>
                        </div>
                    </div>
                </template>

            </div>
        </main>
    </div>

    <script>
        function acadenceOS() {
            return {
                authorized: false,
                view: 'dashboard',
                streak: 14,
                countdown: '00D : 00H : 00M : 00S',
                
                init() {
                    lucide.createIcons();
                    this.startCountdown();
                },

                markAttendance() {
                    this.authorized = true;
                    this.streak++;
                    // Re-init icons for the new view
                    setTimeout(() => lucide.createIcons(), 100);
                },

                getGreeting() {
                    const hrs = new Date().getHours();
                    if (hrs < 12) return "Identity Confirmed • Morning, Scholar";
                    if (hrs < 18) return "Identity Confirmed • Afternoon, Scholar";
                    return "Identity Confirmed • Evening, Scholar";
                },

                viewTitle() {
                    const titles = {
                        dashboard: "Mission Control",
                        academic: "Academic Vault",
                        extra: "Extracurricular Hub",
                        analytics: "Productivity Intelligence",
                        wellness: "Biological Balance",
                        ai: "Neural Assistant"
                    };
                    return titles[this.view];
                },

                startCountdown() {
                    const target = new Date();
                    target.setDate(target.getDate() + 14); // Mock target 14 days away

                    setInterval(() => {
                        const now = new Date().getTime();
                        const diff = target.getTime() - now;

                        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);

                        this.countdown = `${d}D : ${h}H : ${m}M : ${s}S`;
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
